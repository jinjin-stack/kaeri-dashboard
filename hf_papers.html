<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HuggingFace Daily Papers</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d2e;
      --border: #2a2d3e;
      --accent: #ff6b35;
      --accent2: #ffb347;
      --text: #e8eaf0;
      --muted: #8b8fa8;
      --link: #7eb8f7;
      --tag-bg: #252840;
      --progress: #ff6b35;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 32px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    header .logo-icon {
      font-size: 2rem;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header .date {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .progress-bar-wrap {
      width: 100%;
      max-width: 720px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .progress-bar-bg {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 9999px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 9999px;
      transition: width 0.4s cubic-bezier(.4,0,.2,1);
    }

    .progress-label {
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .card-container {
      width: 100%;
      max-width: 720px;
      position: relative;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      animation: slideIn 0.35s cubic-bezier(.4,0,.2,1);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-rank {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 9999px;
      margin-bottom: 14px;
    }

    .card-rank.top { background: linear-gradient(135deg, #ffd700, #ff8c00); }

    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.45;
      margin-bottom: 14px;
      color: #fff;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 3px 10px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .meta-chip.upvote {
      color: var(--accent2);
      border-color: rgba(255,179,71,0.25);
      background: rgba(255,179,71,0.07);
    }

    .abstract-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .abstract {
      font-size: 0.92rem;
      line-height: 1.75;
      color: #c5c8d8;
    }

    .abstract.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .expand-btn {
      background: none;
      border: none;
      color: var(--link);
      font-size: 0.82rem;
      cursor: pointer;
      margin-top: 6px;
      padding: 0;
    }

    .highlights {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .highlight-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 0.85rem;
      color: #b0b4cc;
    }

    .highlight-item::before {
      content: '▸';
      color: var(--accent);
      flex-shrink: 0;
      margin-top: 1px;
    }

    .links-row {
      margin-top: 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .link-btn:hover { opacity: 0.8; }

    .link-btn.hf {
      background: rgba(255,107,53,0.15);
      color: var(--accent);
      border: 1px solid rgba(255,107,53,0.3);
    }

    .link-btn.arxiv {
      background: rgba(126,184,247,0.1);
      color: var(--link);
      border: 1px solid rgba(126,184,247,0.2);
    }

    .link-btn.github {
      background: rgba(255,255,255,0.06);
      color: #ccc;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .nav-row {
      width: 100%;
      max-width: 720px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 24px;
      gap: 12px;
    }

    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .nav-btn:hover:not(:disabled) {
      background: #22263d;
      border-color: var(--accent);
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .nav-btn.next {
      background: linear-gradient(135deg, var(--accent), #e05500);
      border-color: transparent;
      color: #fff;
    }

    .nav-btn.next:hover:not(:disabled) {
      background: linear-gradient(135deg, #ff8a5c, #ff6b35);
    }

    .dots {
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--border);
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }

    .dot.active {
      background: var(--accent);
      transform: scale(1.3);
    }

    footer {
      margin-top: 40px;
      color: var(--muted);
      font-size: 0.78rem;
      text-align: center;
    }

    footer a { color: var(--link); text-decoration: none; }
  </style>
</head>

<header>
  <div class="logo">

let current = 0;
let expanded = false;

function renderCard() {
  expanded = false;
  const p = papers[current];
  const isTop = p.rank === 1;

  const rankLabel = isTop
    ? `<span class="card-rank top">🏆 #${p.rank} Paper of the Day</span>`
    : `<span class="card-rank">#${p.rank}</span>`;

  const authorsStr = p.authors.slice(0, 4).join(', ') + (p.authors.length > 4 ? ` 외 ${p.authors.length - 4}명` : '');

  const highlightItems = p.highlights.map(h =>
    `<div class="highlight-item">${h}</div>`
  ).join('');

  const githubLink = p.githubUrl
    ? `<a class="link-btn github" href="${p.githubUrl}" target="_blank">⚙ GitHub</a>`
    : '';

  const card = document.getElementById('card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';

  card.innerHTML = `
    ${rankLabel}
    <div class="card-title">${p.title}</div>
    <div class="card-meta">
      <span class="meta-chip">👤 ${authorsStr}</span>
      <span class="meta-chip">🏛 ${p.org}</span>
      <span class="meta-chip upvote">▲ ${p.upvotes} upvotes</span>
    </div>
    <div class="abstract-label">초록 (Abstract)</div>
    <div class="abstract collapsed" id="abstractText">${p.abstract}</div>
    <button class="expand-btn" id="expandBtn" onclick="toggleExpand()">더 보기 ▾</button>
    <div class="highlights">${highlightItems}</div>
    <div class="links-row">
      <a class="link-btn hf" href="${p.hfUrl}" target="_blank">🤗 HuggingFace</a>
      <a class="link-btn arxiv" href="${p.arxivUrl}" target="_blank">📄 arXiv</a>
      ${githubLink}
    </div>
  `;

  updateProgress();
  updateNav();
  updateDots();
}

function toggleExpand() {
  expanded = !expanded;
  const abstractEl = document.getElementById('abstractText');
  const btnEl = document.getElementById('expandBtn');
  if (expanded) {
    abstractEl.classList.remove('collapsed');
    btnEl.textContent = '접기 ▴';
  } else {
    abstractEl.classList.add('collapsed');
    btnEl.textContent = '더 보기 ▾';
  }
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= papers.length) return;
  current = next;
  renderCard();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goTo(index) {
  current = index;
  renderCard();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateProgress() {
  const pct = ((current + 1) / papers.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${current + 1} / ${papers.length}`;
}

function updateNav() {
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === papers.length - 1;
}

function updateDots() {
  const container = document.getElementById('dots');
  container.innerHTML = '';
  papers.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === current ? ' active' : '');
    dot.onclick = () => goTo(i);
    container.appendChild(dot);
  });
}

renderCard();

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
});
</script>
